<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List Pro</title>
    <link rel="stylesheet" href="tugas_4.css">
</head>

<body>
    <div class="container">
        <h1>My Tasks</h1>

        <div class="input-row">
            <input type="text" id="todo-input" placeholder="Tambah tugas baru...">
            <button id="add-btn">Add</button>
        </div>

        <p id="err-msg"></p>

        <div class="filter-row">
            <button id="filter-all" class="active" onclick="setFilter('all')">All</button>
            <button id="filter-active" onclick="setFilter('active')">Active</button>
            <button id="filter-completed" onclick="setFilter('completed')">Completed</button>
        </div>

        <ul id="todo-list"></ul>
    </div>

    <script src="tugas_4.js"></script>
</body>

</html>
